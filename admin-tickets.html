<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank IT Service Desk - Tickets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">

        <div class="admin-layout">

            <aside class="sidebar">

                <div class="sidebar-logo">
                    <a class="logo-box logo-link" href="login.html" aria-label="Giriş sayfasına git"><img src="assets/bank-logo.svg" alt="Banka"></a>
                    <h3>IT Service Desk</h3>
                </div>

                <a href="admin.html">🏠 Dashboard</a>
                <a href="admin-tickets.html" class="active">📋 Tickets</a>
                <a href="admin-reports.html">📊 Reports</a>
                <a href="admin-requests.html">Requests</a>
                <a href="staff-performance.html">Staff Performance</a>
                <a href="ai-agent-reports.html">AI Agent Rapor</a>
                <a href="audit-log.html">Audit Log</a>
                <a href="admin-users.html">Kullanıcı Yönetimi</a>
                <a href="admin-kb.html">Knowledge Base</a>

                <button onclick="logout()">
                    Çıkış Yap
                </button>

            </aside>

            <main class="content-area">

                <div class="logo-area">
                    <div>
                        <h1>Çağrı Yönetimi</h1>
                        <p>All Tickets</p>
                    </div>
                </div>

                <hr>

                <div class="filter-tabs">
                    <button onclick="loadTickets()">Tümü</button>
                    <button onclick="filterAdminTickets('Açık')">Açık</button>
                    <button onclick="filterAdminTickets('İnceleniyor')">İnceleniyor</button>
                    <button onclick="filterAdminTickets('Çözüldü')">Çözüldü</button>
                </div>

                <div id="ticketDetail"></div>

                <div id="ticketList"></div>

            </main>

        </div>

    </div>
</div>

<script>
    const adminRole = localStorage.getItem("role");

    if (!adminRole || adminRole !== "admin") {
        window.location.replace("login.html");
    }
</script>

<script src="script.js"></script>

<script>
    window.addEventListener("DOMContentLoaded", function () {
        loadTickets();
    });
</script>

<script src="session-timeout.js"></script>
</body>
</html>
